name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./projects/ngx-trpc-client/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Verify CHANGELOG has a dated entry for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -qE "^## \[$VERSION\] - " CHANGELOG.md; then
            echo "::error::No dated CHANGELOG.md entry for $VERSION (expected '## [$VERSION] - YYYY-MM-DD')"
            exit 1
          fi

      - name: Build library
        run: pnpm run build:lib

      # npm >= 11.5.1 is required for OIDC trusted publishing
      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish ./dist/ngx-trpc-client --access public --provenance

      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          gh release create "${GITHUB_REF_NAME}" --title "$VERSION" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
